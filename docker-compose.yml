version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fastapi-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vite-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    restart: unless-stopped