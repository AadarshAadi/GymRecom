version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fastapi-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vite-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    restart: unless-stopped

  mysql:
    image: mysql:8.4

    container_name: workout-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: workoutdb
      MYSQL_USER: workoutuser
      MYSQL_PASSWORD: workoutpass

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: