services:
  backend:
    build: ./backend
    container_name: BACKEND
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped
  frontend:
    build: ./frontend
    container_name: FRONTEND
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
  mysql:
    image: mysql:8.4
    container_name: DATABASE
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: workoutdb
      MYSQL_USER: workoutuser
      MYSQL_PASSWORD: workoutpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
volumes:
  mysql_data: